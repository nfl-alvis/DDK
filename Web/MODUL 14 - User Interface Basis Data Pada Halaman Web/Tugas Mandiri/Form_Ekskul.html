<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Pendaftaran Ekskul</title>

    <style>
      * {
        font-family: "Times New Roman", Times, serif;
      }

      body {
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f5f5f5;
      }

      form {
        width: 420px;
        border: 1px solid #ccc;
        padding: 20px;
        border-radius: 10px;
        background-color: white;
      }

      h2 {
        color: #9b6dff;
        text-align: center;
      }

      table {
        width: 100%;
        border-spacing: 10px;
      }

      input[type="text"],
      input[type="date"],
      select,
      textarea {
        width: 100%;
        padding: 5px;
        box-sizing: border-box;
      }

      .radio-group {
        display: flex;
        gap: 15px;
        align-items: center;
      }

      .radio-group label {
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .note {
        margin-top: 10px;
        font-size: 14px;
      }

      .note span {
        color: red;
      }

      .btn-submit {
        margin-top: 15px;
        width: 100%;
        padding: 8px;
        background-color: #9b6dff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }

      .btn-submit:hover {
        background-color: #7a4de0;
      }
    </style>
  </head>

  <body>
    <form method="post" action="simpan_siswa.php">
      <h2>Form Pendaftaran Ekskul</h2>
      <hr />

      <table>
        <tr>
          <td>NIS</td>
          <td>:</td>
          <td><input type="text" name="nis" required /></td>
        </tr>

        <tr>
          <td>Nama</td>
          <td>:</td>
          <td><input type="text" name="nama" required /></td>
        </tr>

        <tr>
          <td>Kelas</td>
          <td>:</td>
          <td>
            <select name="kelas" required>
              <option value="X">X</option>
              <option value="XI">XI</option>
              <option value="XII">XII</option>
            </select>
          </td>
        </tr>

        <tr>
          <td>Tgl Lahir</td>
          <td>:</td>
          <td><input type="date" name="tgl_lahir" required /></td>
        </tr>

        <tr>
          <td>Alamat</td>
          <td>:</td>
          <td><textarea name="alamat" required></textarea></td>
        </tr>

        <tr>
          <td>Kota</td>
          <td>:</td>
          <td><input type="text" name="kota" required /></td>
        </tr>

        <tr>
          <td>Jenis Kelamin</td>
          <td>:</td>
          <td>
            <div class="radio-group">
              <label>
                <input
                  type="radio"
                  name="jenis_kelamin"
                  value="Laki-laki"
                  required
                />
                Laki-laki
              </label>
              <label>
                <input
                  type="radio"
                  name="jenis_kelamin"
                  value="Perempuan"
                  required
                />
                Perempuan
              </label>
            </div>
          </td>
        </tr>

        <tr>
          <td>Hobby</td>
          <td>:</td>
          <td>
            <input type="checkbox" name="hobby[]" value="Membaca" id="h1" />
            <label for="h1">Membaca</label><br />

            <input type="checkbox" name="hobby[]" value="Olahraga" id="h2" />
            <label for="h2">Olahraga</label><br />

            <input type="checkbox" name="hobby[]" value="Musik" id="h3" />
            <label for="h3">Musik</label>
          </td>
        </tr>

        <tr>
          <td>Pilihan Ekskul</td>
          <td>:</td>
          <td>
            <select name="ekskul[]" multiple required>
              <option value="Paskibra">Paskibra</option>
              <option value="PMR">PMR</option>
              <option value="Pramuka">Pramuka</option>
            </select>
          </td>
        </tr>
      </table>

      <div class="note"><span>*</span> Harus di isi</div>

      <button type="submit" class="btn-submit">Daftar</button>
    </form>
  </body>
</html>
